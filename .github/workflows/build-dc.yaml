name: Build deployment config

on:
  push:
    tags:
      - 'd*'
    branches:
      - 'main'
      - 'deploy/*'
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BROKER_URL: https://broker.io.nrs.gov.bc.ca
  BROKER_JWT: ${{ secrets.broker_jwt_e985d455_b0ff_470b_8731_e004fcfac915 }}

jobs:
  build-dc:
    name: Build deployment config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set version
        id: set-version
        run: |
          REF_NAME="${{ github.ref_name }}"
          SAFE_REF_NAME=$(echo "$REF_NAME" | tr '/' '-')

          if [[ ${{ startsWith(github.ref, 'refs/heads/') }} = true ]]; then
            echo "tag=${SAFE_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          if [[ ${{ startsWith(github.ref, 'refs/pull/') }} = true ]]; then
            echo "tag=${SAFE_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          if [[ ${{ startsWith(github.ref, 'refs/tags/d') }} = true ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup ORAS
        uses: oras-project/setup-oras@v2
      - name: Verify catalog info and get deploy config path type
        id: catalog-info
        run: |
          CATALOG_FILE="catalog-info.yaml"

          if [[ ! -f "$CATALOG_FILE" ]]; then
            echo "Error: $CATALOG_FILE was not found."
            exit 1
          fi

          service_name="$(yq e '.metadata.name // ""' "$CATALOG_FILE" | tr -d '\r')"
          deploy_type="$(yq e '.metadata.annotations["playbook.io.nrs.gov.bc.ca/deployType"] // ""' "$CATALOG_FILE" | tr -d '\r')"
          deploy_config_path="$(yq e '.metadata.annotations["playbook.io.nrs.gov.bc.ca/deploymentConfigPaths"] // ""' "$CATALOG_FILE" | tr -d '\r')"
          echo "service_name=$service_name" >> "$GITHUB_OUTPUT"
          echo "deploy_type=$deploy_type" >> "$GITHUB_OUTPUT"
          echo "deploy_config_path=$deploy_config_path" >> "$GITHUB_OUTPUT"
          echo "Resolved service_name: $service_name"
          echo "Resolved deploy_type: $deploy_type"
          echo "Resolved deploy_config_path: $deploy_config_path"
      - name: Create annotations files
        run: |
          cat <<EOF > annotation.json
          {
            "\$manifest": {
              "org.opencontainers.image.description": "Deployment configuration ${PROJECT_TAG}",
              "org.opencontainers.image.source": "${{ github.repositoryUrl }}",
              "org.opencontainers.image.title": "deployment-config",
              "org.opencontainers.image.version": "${PROJECT_TAG}"
            }
          }
          EOF
        env:
          PROJECT_TAG: ${{ steps.set-version.outputs.tag }}
      - name: Push deployment config to registry
        id: publish-dc
        run: |
          oras login ghcr.io -u ${{ github.actor }} --password-stdin <<< ${{ secrets.GITHUB_TOKEN }}
          oras push --annotation-file annotation.json --export-manifest manifest.json ghcr.io/${{ github.repository }}/deployment-config:${PROJECT_TAG} .jenkins catalog-info.yaml playbooks
          MANIFEST=$(cat ./manifest.json)
          ARTIFACT_SHA256=$(echo $MANIFEST | sha256sum | awk '{print $1}')
          ARTIFACT_SIZE=$(echo $MANIFEST | jq -r '.layers | map(.size) | add')
          echo "artifact_sha256=$ARTIFACT_SHA256" >> $GITHUB_OUTPUT
          echo "artifact_size=$ARTIFACT_SIZE" >> $GITHUB_OUTPUT
          echo $MANIFEST
          echo "sha256: $ARTIFACT_SHA256"
        env:
          PROJECT_TAG: ${{ steps.set-version.outputs.tag }}
      - name: Resolve package link
        id: package-link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TAG: ${{ steps.set-version.outputs.tag }}
          PACKAGE_NAME: ${{ steps.catalog-info.outputs.service_name }}/deployment-config
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          ENCODED_PACKAGE_NAME="${PACKAGE_NAME//\//%2F}"
          VERSION_ID="$(gh api "orgs/${REPOSITORY_OWNER}/packages/container/${ENCODED_PACKAGE_NAME}/versions" --paginate | jq -r --arg tag "$PROJECT_TAG" '.[] | select((.metadata.container.tags // []) | index($tag)) | .id' | head -n 1)"

          if [[ -z "$VERSION_ID" ]]; then
            PACKAGE_URL="https://github.com/${{ github.repository }}/pkgs/container/${ENCODED_PACKAGE_NAME}"
          else
            PACKAGE_URL="https://github.com/${{ github.repository }}/pkgs/container/${ENCODED_PACKAGE_NAME}/${VERSION_ID}?tag=${PROJECT_TAG}"
          fi

          echo "package_url=$PACKAGE_URL" >> "$GITHUB_OUTPUT"
      - name: Generate deployment config summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # Build Deployment Config Summary

          | | |
          | - | - |
          | **Deployment Config Tag** | \`${{ env.PROJECT_TAG }}\` |
          | **Package** | [deployment-config](${{ env.PACKAGE_URL }}) |
          | **Deploy Type** | \`${{ env.DEPLOY_TYPE }}\` |
          | **Deployment Config Path** | \`${{ env.DEPLOY_CONFIG_PATH }}\` |
          | **Artifact SHA256** | \`${{ env.ARTIFACT_SHA256 }}\` |
          | **Artifact Size** | \`${{ env.ARTIFACT_SIZE }}\`

          EOF
        env:
          PROJECT_TAG: ${{ steps.set-version.outputs.tag }}
          PACKAGE_URL: ${{ steps.package-link.outputs.package_url }}
          DEPLOY_TYPE: ${{ steps.catalog-info.outputs.deploy_type }}
          DEPLOY_CONFIG_PATH: ${{ steps.catalog-info.outputs.deploy_config_path }}
          ARTIFACT_SHA256: ${{ steps.publish-dc.outputs.artifact_sha256 }}
          ARTIFACT_SIZE: ${{ steps.publish-dc.outputs.artifact_size }}
